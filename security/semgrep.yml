rules:
  # ── Tenant Isolation ──
  - id: direct-tenantid-in-query
    patterns:
      - pattern: |
          prisma.$MODEL.$METHOD({ where: { ..., tenantId: $VAL, ... } })
      - pattern-not: |
          prisma.$MODEL.$METHOD({ where: { ..., tenantId: req.tenantId, ... } })
    message: >
      Direct tenantId in Prisma query. Tenant filtering should be handled
      automatically by the tenant extension in db.js. Use req.tenantId if manual.
    languages: [javascript]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-284: Improper Access Control"

  - id: missing-tenant-guard
    patterns:
      - pattern: |
          app.use($PATH, require($ROUTE));
      - pattern-not-inside: |
          app.use(require('@budgebucket/shared').tenantGuard);
          ...
    message: >
      Route mounted without tenantGuard middleware.
    languages: [javascript]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-284: Improper Access Control"

  # ── Authentication & Authorization ──
  - id: route-missing-auth-middleware
    patterns:
      - pattern: |
          app.use($PATH, require($ROUTE));
      - pattern-not-inside: |
          app.use(require('@budgebucket/shared').auth);
          ...
    message: >
      Route mounted without auth middleware.
    languages: [javascript]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-306: Missing Authentication for Critical Function"

  # ── Injection Prevention ──
  - id: raw-sql-usage
    pattern-either:
      - pattern: prisma.$queryRaw(...)
      - pattern: prisma.$queryRawUnsafe(...)
      - pattern: prisma.$executeRaw(...)
      - pattern: prisma.$executeRawUnsafe(...)
    message: >
      Raw SQL query detected. These bypass tenant isolation and audit extensions.
      Use Prisma model queries or db.safeQueryRaw().
    languages: [javascript]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-89: SQL Injection"

  - id: unvalidated-parseint
    pattern: parseInt(req.$SOURCE.$PARAM)
    fix: parseInt(req.$SOURCE.$PARAM, 10)
    message: >
      parseInt() without radix. Always specify radix 10.
    languages: [javascript]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-704: Incorrect Type Conversion"

  - id: string-concat-in-query
    pattern: |
      prisma.$MODEL.$METHOD({ where: { ..., $FIELD: `...${$VAR}...`, ... } })
    message: >
      String interpolation in Prisma query value. Use parameterized values.
    languages: [javascript]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-89: SQL Injection"

  # ── Sensitive Data Exposure ──
  - id: hardcoded-password
    pattern: |
      const password = "...";
    message: >
      Hardcoded password. Use environment variables via process.env.
    languages: [javascript]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"

  - id: hardcoded-secret
    pattern: |
      const secret = "...";
    message: >
      Hardcoded secret. Use environment variables via process.env.
    languages: [javascript]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"

  - id: hardcoded-api-key
    pattern: |
      const apiKey = "...";
    message: >
      Hardcoded API key. Use environment variables via process.env.
    languages: [javascript]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"

  - id: auth-header-in-log
    pattern-either:
      - pattern: console.log(..., req.headers.authorization, ...)
      - pattern: console.error(..., req.headers.authorization, ...)
    message: >
      Authorization header logged. Avoid logging tokens or secrets.
    languages: [javascript]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"

  - id: error-stack-in-response
    pattern-either:
      - pattern: res.json({ ..., stack: $ERR.stack, ... })
      - pattern: res.status($CODE).json({ ..., stack: ..., ... })
    message: >
      Error stack trace sent in API response. This leaks internal details.
    languages: [javascript]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-209: Generation of Error Message Containing Sensitive Information"

  - id: raw-error-in-response
    pattern: res.json({ ..., error: $ERR, ... })
    message: >
      Raw error object in API response. Return a generic error message instead.
    languages: [javascript]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-209: Generation of Error Message Containing Sensitive Information"

  # ── CORS & Headers ──
  - id: cors-wildcard
    pattern: |
      app.use(cors({ origin: true }))
    message: >
      CORS with origin:true reflects any origin. Verify this service is not directly exposed.
    languages: [javascript]
    severity: INFO
    metadata:
      category: security
      cwe: "CWE-346: Origin Validation Error"

  # ── Input Validation ──
  - id: missing-body-validation
    patterns:
      - pattern: |
          router.post($PATH, async (req, res, next) => {
            ...
            const { ..., $FIELD, ... } = req.body;
            ...
          })
      - pattern-not: router.post($PATH, validate(...), ...)
    message: >
      POST route destructures req.body without validate() middleware.
    languages: [javascript]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-20: Improper Input Validation"

  # ── Prototype Pollution ──
  - id: object-spread-from-body
    pattern: |
      { ...$SPREAD, ...req.body }
    message: >
      Spreading req.body directly into an object. Destructure only expected fields.
    languages: [javascript]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-915: Improperly Controlled Modification of Dynamically-Determined Object Attributes"
